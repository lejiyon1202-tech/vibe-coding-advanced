<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#EFF6FF" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing=".5">
    Subagents — 병렬 실행으로 3배 빠른 처리
  </text>

  <!-- 오케스트레이터 (중앙 상단) -->
  <rect x="295" y="30" width="210" height="54" rx="10" fill="#1E3A8A"/>
  <text x="400" y="50" text-anchor="middle" font-size="11" font-weight="800" fill="white">🎯 오케스트레이터</text>
  <text x="400" y="65" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,0.9)">메인 Claude — 작업 분배 &amp; 결과 취합</text>
  <text x="400" y="78" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">독립 컨텍스트 유지</text>

  <!-- 화살표: 오케스트레이터 → 좌측 서브에이전트 -->
  <line x1="335" y1="84" x2="168" y2="128" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="163,124 172,134 162,135" fill="#93C5FD"/>

  <!-- 화살표: 오케스트레이터 → 중앙 서브에이전트 -->
  <line x1="400" y1="84" x2="400" y2="128" stroke="#2563EB" stroke-width="2"/>
  <polygon points="394,125 400,135 406,125" fill="#2563EB"/>

  <!-- 화살표: 오케스트레이터 → 우측 서브에이전트 -->
  <line x1="465" y1="84" x2="632" y2="128" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="627,124 638,134 628,135" fill="#93C5FD"/>

  <!-- 서브에이전트 1: 코드 리뷰 -->
  <rect x="55" y="130" width="215" height="52" rx="10" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="162" y="150" text-anchor="middle" font-size="14">🔍</text>
  <text x="162" y="164" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">코드 리뷰 에이전트</text>
  <text x="162" y="176" text-anchor="middle" font-size="8.5" fill="#64748B">Read · Grep 도구만 허용</text>

  <!-- 서브에이전트 2: 보안 감사 (강조) -->
  <rect x="292" y="130" width="215" height="52" rx="10" fill="#2563EB"/>
  <text x="400" y="150" text-anchor="middle" font-size="14">🛡️</text>
  <text x="400" y="164" text-anchor="middle" font-size="9.5" font-weight="800" fill="white">보안 감사 에이전트</text>
  <text x="400" y="176" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.85)">독립 컨텍스트 · 최소 권한</text>

  <!-- 서브에이전트 3: 문서 작성 -->
  <rect x="530" y="130" width="215" height="52" rx="10" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="637" y="150" text-anchor="middle" font-size="14">📝</text>
  <text x="637" y="164" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">문서 작성 에이전트</text>
  <text x="637" y="176" text-anchor="middle" font-size="8.5" fill="#64748B">worktree 격리 모드</text>

  <!-- 결과 취합 레이블 -->
  <rect x="308" y="186" width="183" height="12" rx="5" fill="#DBEAFE"/>
  <text x="400" y="196" text-anchor="middle" font-size="7.5" font-weight="700" fill="#1E3A8A">3개 동시 실행 → 오케스트레이터 결과 취합</text>

</svg>
