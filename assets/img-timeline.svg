<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="120" fill="#EFF6FF" rx="10"/>

  <!-- 타임라인 기준선 -->
  <line x1="120" y1="56" x2="680" y2="56" stroke="#DBEAFE" stroke-width="3"/>

  <!-- 화살표 1→2 -->
  <line x1="196" y1="56" x2="358" y2="56" stroke="#93C5FD" stroke-width="2"/>
  <polygon points="354,51 364,56 354,61" fill="#93C5FD"/>

  <!-- 화살표 2→3 -->
  <line x1="442" y1="56" x2="594" y2="56" stroke="#93C5FD" stroke-width="2"/>
  <polygon points="590,51 600,56 590,61" fill="#93C5FD"/>

  <!-- 노드 1: 어제 -->
  <circle cx="160" cy="56" r="32" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="160" y="51" text-anchor="middle" font-size="15">🌙</text>
  <text x="160" y="65" text-anchor="middle" font-size="8.5" font-weight="600" fill="#64748B">어제</text>

  <!-- 어제 설명 -->
  <text x="160" y="96" text-anchor="middle" font-size="9.5" font-weight="600" fill="#64748B">조수(Assistant)</text>
  <text x="160" y="110" text-anchor="middle" font-size="8" fill="#94A3B8">기본 대화 · 코드 생성</text>

  <!-- 노드 2: 오늘 (강조) -->
  <circle cx="400" cy="56" r="38" fill="#1E3A8A"/>
  <circle cx="400" cy="56" r="32" fill="#2563EB"/>
  <text x="400" y="50" text-anchor="middle" font-size="16" fill="white">⚡</text>
  <text x="400" y="65" text-anchor="middle" font-size="9" font-weight="800" fill="white">오늘</text>

  <!-- 오늘 설명 -->
  <text x="400" y="96" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2563EB">동료 개발자</text>
  <text x="400" y="110" text-anchor="middle" font-size="8" fill="#2563EB">Projects · Skills · Hooks · MCP</text>

  <!-- 노드 3: 내일 -->
  <circle cx="635" cy="56" r="32" fill="#fff" stroke="#2563EB" stroke-width="2"/>
  <text x="635" y="51" text-anchor="middle" font-size="15">🚀</text>
  <text x="635" y="65" text-anchor="middle" font-size="8.5" font-weight="700" fill="#2563EB">내일</text>

  <!-- 내일 설명 -->
  <text x="635" y="96" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1E3A8A">멀티에이전트 자율 조직</text>
  <text x="635" y="110" text-anchor="middle" font-size="8" fill="#64748B">사람은 방향만 · AI가 실행</text>

</svg>
