<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#EFF6FF" rx="12"/>

  <!-- 왼쪽 — 지식 컨테이너 -->
  <!-- 폴더 아이콘 -->
  <rect x="60" y="44" width="120" height="86" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="60" y="36" width="64" height="16" rx="4" fill="#93C5FD"/>
  <rect x="72" y="54" width="96" height="12" rx="3" fill="#BFDBFE"/>
  <rect x="72" y="72" width="80" height="10" rx="3" fill="#BFDBFE"/>
  <rect x="72" y="88" width="88" height="10" rx="3" fill="#BFDBFE"/>
  <rect x="72" y="104" width="72" height="10" rx="3" fill="#BFDBFE"/>

  <!-- 파일 레이블들 -->
  <text x="120" y="30" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A" letter-spacing=".8">PROJECTS</text>
  <text x="120" y="145" text-anchor="middle" font-size="10" fill="#3B82F6">Custom Instructions</text>
  <text x="120" y="160" text-anchor="middle" font-size="10" fill="#3B82F6">+ 파일 업로드</text>

  <!-- 파일 아이콘들 (오버레이) -->
  <rect x="138" y="60" width="28" height="36" rx="4" fill="#fff" stroke="#BFDBFE" stroke-width="1.2"/>
  <rect x="138" y="55" width="14" height="8" rx="2" fill="#BFDBFE"/>
  <rect x="143" y="70" width="18" height="2" rx="1" fill="#BFDBFE"/>
  <rect x="143" y="75" width="14" height="2" rx="1" fill="#BFDBFE"/>
  <rect x="143" y="80" width="16" height="2" rx="1" fill="#BFDBFE"/>

  <!-- 화살표 중앙 -->
  <line x1="210" y1="100" x2="330" y2="100" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="330,94 344,100 330,106" fill="#2563EB"/>

  <!-- 중앙 레이블 -->
  <text x="270" y="90" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">자동 로드</text>
  <text x="270" y="118" text-anchor="middle" font-size="9" fill="#3B82F6">매 세션 적용</text>

  <!-- 오른쪽 — Claude 대화 UI -->
  <rect x="350" y="30" width="260" height="140" rx="10" fill="#fff" stroke="#DBEAFE" stroke-width="1.5"/>

  <!-- 헤더 바 -->
  <rect x="350" y="30" width="260" height="28" rx="10" fill="#2563EB"/>
  <rect x="350" y="44" width="260" height="14" fill="#2563EB"/>
  <circle cx="368" cy="44" r="5" fill="rgba(255,255,255,0.3)"/>
  <text x="385" y="48" font-size="10" font-weight="600" fill="white">Claude · Projects</text>

  <!-- AI 메시지 박스 1 -->
  <rect x="362" y="68" width="180" height="26" rx="6" fill="#EFF6FF"/>
  <text x="372" y="80" font-size="9.5" fill="#1E3A8A">팀 보고서 규칙 기억하고 있습니다.</text>
  <text x="372" y="91" font-size="9.5" fill="#1E3A8A">결론 → 근거 순서로 초안 작성해 드릴게요.</text>

  <!-- 사용자 메시지 -->
  <rect x="392" y="102" width="200" height="20" rx="6" fill="#2563EB"/>
  <text x="398" y="115" font-size="9.5" fill="white">이번 주 성과 보고서 초안 써줘</text>

  <!-- AI 메시지 2 -->
  <rect x="362" y="130" width="200" height="28" rx="6" fill="#EFF6FF"/>
  <text x="372" y="142" font-size="9.5" fill="#1E3A8A">매번 설명 없이 바로 팀 스타일로</text>
  <text x="372" y="153" font-size="9.5" fill="#1E3A8A">보고서를 작성해 드립니다. ✓</text>

  <!-- 우측 레이블 -->
  <text x="480" y="184" text-anchor="middle" font-size="10" fill="#3B82F6">한 번 설정 → 영구 적용</text>

  <!-- 배지 -->
  <rect x="630" y="72" width="110" height="22" rx="6" fill="#DBEAFE"/>
  <text x="685" y="86" text-anchor="middle" font-size="10" font-weight="700" fill="#1E3A8A">배경 지식 컨테이너</text>
  <rect x="630" y="102" width="110" height="22" rx="6" fill="#DBEAFE"/>
  <text x="685" y="116" text-anchor="middle" font-size="10" fill="#2563EB">팀 공유 가능 (Team+)</text>
  <rect x="630" y="132" width="110" height="22" rx="6" fill="#DBEAFE"/>
  <text x="685" y="146" text-anchor="middle" font-size="10" fill="#2563EB">정적 · GUI 기반</text>

</svg>
