<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#EFF6FF" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing=".5">
    CLAUDE.md — 계층 구조 (상위가 하위를 오버라이드)
  </text>

  <!-- 레벨 1: 전역 -->
  <rect x="300" y="34" width="200" height="36" rx="8" fill="#1E3A8A"/>
  <text x="400" y="52" text-anchor="middle" font-size="10" font-weight="700" fill="white">~/CLAUDE.md</text>
  <text x="400" y="64" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)">내 모든 프로젝트에 적용 · 개인 전역 규칙</text>

  <!-- 화살표 아래로 -->
  <line x1="400" y1="70" x2="400" y2="85" stroke="#2563EB" stroke-width="2"/>
  <polygon points="394,83 400,95 406,83" fill="#2563EB"/>

  <!-- 분기선 -->
  <line x1="200" y1="93" x2="600" y2="93" stroke="#BFDBFE" stroke-width="1.5"/>
  <!-- 왼쪽 아래 -->
  <line x1="220" y1="93" x2="220" y2="108" stroke="#BFDBFE" stroke-width="1.5"/>
  <!-- 가운데 아래 -->
  <line x1="400" y1="93" x2="400" y2="108" stroke="#BFDBFE" stroke-width="1.5"/>
  <!-- 오른쪽 아래 -->
  <line x1="580" y1="93" x2="580" y2="108" stroke="#BFDBFE" stroke-width="1.5"/>

  <!-- 레벨 2: 프로젝트별 -->
  <!-- 왼쪽 -->
  <rect x="110" y="108" width="220" height="40" rx="8" fill="#2563EB"/>
  <text x="220" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="white">프로젝트A/CLAUDE.md</text>
  <text x="220" y="138" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.8)">이 프로젝트 팀 공통 · git 공유</text>

  <!-- 가운데 (빈 예시) -->
  <rect x="290" y="108" width="220" height="40" rx="8" fill="#2563EB"/>
  <text x="400" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="white">프로젝트B/CLAUDE.md</text>
  <text x="400" y="138" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.8)">다른 프로젝트 별도 규칙</text>

  <!-- 오른쪽 -->
  <rect x="470" y="108" width="220" height="40" rx="8" fill="#2563EB"/>
  <text x="580" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="white">프로젝트C/CLAUDE.md</text>
  <text x="580" y="138" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.8)">팀별 기술 스택·컨벤션</text>

  <!-- 프로젝트A 서브폴더 -->
  <line x1="220" y1="148" x2="220" y2="160" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="110" y="160" width="220" height="30" rx="6" fill="#3B82F6"/>
  <text x="220" y="173" text-anchor="middle" font-size="9.5" font-weight="600" fill="white">프로젝트A/서브폴더/CLAUDE.md</text>
  <text x="220" y="184" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.8)">모듈별 특수 규칙</text>

  <!-- 우측 레이블 박스 -->
  <rect x="620" y="108" width="158" height="82" rx="8" fill="#DBEAFE"/>
  <text x="699" y="126" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">계층 원칙</text>
  <text x="699" y="141" text-anchor="middle" font-size="9" fill="#2563EB">상위 = 더 넓은 범위</text>
  <text x="699" y="154" text-anchor="middle" font-size="9" fill="#2563EB">하위 = 더 좁은 범위</text>
  <text x="699" y="167" text-anchor="middle" font-size="9" fill="#1E3A8A">하위가 상위를 추가·</text>
  <text x="699" y="180" text-anchor="middle" font-size="9" fill="#1E3A8A">덮어쓰기 가능</text>

</svg>
