<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#EFF6FF" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing=".5">
    Skills — Progressive Disclosure 3단계 로딩
  </text>

  <!-- L1 박스 -->
  <rect x="40" y="38" width="200" height="120" rx="10" fill="#fff" stroke="#DBEAFE" stroke-width="1.5"/>
  <rect x="40" y="38" width="200" height="30" rx="10" fill="#2563EB"/>
  <rect x="40" y="54" width="200" height="14" fill="#2563EB"/>
  <text x="140" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="white" letter-spacing=".5">L1 — 항상 로드</text>

  <text x="140" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A8A">이름 · 설명만</text>
  <rect x="56" y="92" width="168" height="14" rx="3" fill="#EFF6FF"/>
  <text x="140" y="102" text-anchor="middle" font-size="9" fill="#3B82F6">name: report-draft</text>
  <rect x="56" y="112" width="168" height="14" rx="3" fill="#EFF6FF"/>
  <text x="140" y="122" text-anchor="middle" font-size="9" fill="#3B82F6">description: 보고서 초안 작성 시</text>

  <text x="140" y="148" text-anchor="middle" font-size="9" fill="#6B7280">토큰 사용: 최소</text>

  <!-- 화살표 L1→L2 -->
  <line x1="248" y1="98" x2="278" y2="98" stroke="#93C5FD" stroke-width="2"/>
  <polygon points="278,93 292,98 278,103" fill="#93C5FD"/>
  <text x="270" y="88" text-anchor="middle" font-size="8.5" fill="#6B7280">관련 작업</text>
  <text x="270" y="112" text-anchor="middle" font-size="8.5" fill="#6B7280">감지 시</text>

  <!-- L2 박스 -->
  <rect x="296" y="38" width="200" height="120" rx="10" fill="#fff" stroke="#93C5FD" stroke-width="1.5"/>
  <rect x="296" y="38" width="200" height="30" rx="10" fill="#1E40AF"/>
  <rect x="296" y="54" width="200" height="14" fill="#1E40AF"/>
  <text x="396" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="white" letter-spacing=".5">L2 — 관련 작업 시</text>

  <text x="396" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A8A">SKILL.md 전체</text>
  <rect x="312" y="92" width="168" height="44" rx="3" fill="#EFF6FF"/>
  <text x="320" y="104" font-size="8.5" fill="#1E3A8A">## 이 스킬이 하는 것</text>
  <text x="320" y="116" font-size="8.5" fill="#3B82F6">보고서 구조·어조·금지어 기준</text>
  <text x="320" y="128" font-size="8.5" fill="#3B82F6">으로 초안을 생성합니다.</text>

  <text x="396" y="148" text-anchor="middle" font-size="9" fill="#6B7280">토큰 사용: 중간</text>

  <!-- 화살표 L2→L3 -->
  <line x1="504" y1="98" x2="534" y2="98" stroke="#818CF8" stroke-width="2"/>
  <polygon points="534,93 548,98 534,103" fill="#818CF8"/>
  <text x="526" y="88" text-anchor="middle" font-size="8.5" fill="#6B7280">부속 파일</text>
  <text x="526" y="112" text-anchor="middle" font-size="8.5" fill="#6B7280">필요 시만</text>

  <!-- L3 박스 -->
  <rect x="552" y="38" width="200" height="120" rx="10" fill="#fff" stroke="#818CF8" stroke-width="1.5"/>
  <rect x="552" y="38" width="200" height="30" rx="10" fill="#4F46E5"/>
  <rect x="552" y="54" width="200" height="14" fill="#4F46E5"/>
  <text x="652" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="white" letter-spacing=".5">L3 — 필요 시만</text>

  <text x="652" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A8A">references/ 파일</text>
  <rect x="568" y="92" width="168" height="44" rx="3" fill="#EFF6FF"/>
  <text x="576" y="104" font-size="8.5" fill="#6B7280">references/</text>
  <text x="576" y="116" font-size="8.5" fill="#3B82F6">  template.md</text>
  <text x="576" y="128" font-size="8.5" fill="#3B82F6">  checklist.md</text>

  <text x="652" y="148" text-anchor="middle" font-size="9" fill="#6B7280">토큰 사용: 필요 시만</text>

  <!-- 하단 설명 -->
  <rect x="180" y="172" width="440" height="20" rx="6" fill="#DBEAFE"/>
  <text x="400" y="185" text-anchor="middle" font-size="9.5" fill="#1E3A8A">
    100개 스킬이 있어도 L1(이름·설명)만 항상 로드 → 필요한 스킬만 순차 확장 → 토큰 낭비 없음
  </text>

</svg>
