<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="180" fill="#EFF6FF" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing=".5">
    에이전트 구조 설계 예시 — HR팀 멀티에이전트
  </text>

  <!-- 총괄 에이전트 (상단 중앙) -->
  <rect x="295" y="30" width="210" height="50" rx="10" fill="#1E3A8A"/>
  <text x="400" y="50" text-anchor="middle" font-size="11" font-weight="800" fill="white">🎯 HR 총괄 에이전트</text>
  <text x="400" y="65" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">역할 분배 &amp; 결과 보고 수신</text>

  <!-- 화살표들 -->
  <line x1="340" y1="80" x2="165" y2="120" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="160,116 168,126 158,127" fill="#93C5FD"/>

  <line x1="400" y1="80" x2="400" y2="120" stroke="#2563EB" stroke-width="1.5"/>
  <polygon points="394,117 400,127 406,117" fill="#2563EB"/>

  <line x1="460" y1="80" x2="635" y2="120" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="630,116 640,126 630,127" fill="#93C5FD"/>

  <!-- 채용 공고 에이전트 -->
  <rect x="55" y="122" width="210" height="48" rx="10" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="160" y="140" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">📋 채용 공고 작성봇</text>
  <text x="160" y="154" text-anchor="middle" font-size="8.5" fill="#64748B">CLAUDE.md: 복리후생 목록·금지 표현</text>
  <text x="160" y="166" text-anchor="middle" font-size="8" fill="#94A3B8">도구: Read, Write</text>

  <!-- 면접 일정 에이전트 -->
  <rect x="292" y="122" width="216" height="48" rx="10" fill="#2563EB"/>
  <text x="400" y="140" text-anchor="middle" font-size="9.5" font-weight="800" fill="white">📅 면접 일정 조율봇</text>
  <text x="400" y="154" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.9)">Calendar MCP 연동</text>
  <text x="400" y="166" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.7)">도구: MCP calendar</text>

  <!-- 문서 정리 에이전트 -->
  <rect x="535" y="122" width="210" height="48" rx="10" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="640" y="140" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">📁 입사 서류 정리봇</text>
  <text x="640" y="154" text-anchor="middle" font-size="8.5" fill="#64748B">Google Drive MCP 연동</text>
  <text x="640" y="166" text-anchor="middle" font-size="8" fill="#94A3B8">도구: Drive MCP</text>

</svg>
