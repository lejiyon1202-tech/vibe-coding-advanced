<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#EFF6FF" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing=".5">
    Hooks — 이벤트 발생 시 자동 실행
  </text>

  <!-- 이벤트 박스들 (왼쪽) -->
  <!-- PreToolUse -->
  <rect x="24" y="38" width="130" height="28" rx="6" fill="#1E3A8A"/>
  <text x="89" y="52" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">PreToolUse</text>
  <text x="89" y="62" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">도구 실행 전</text>

  <!-- PostToolUse -->
  <rect x="24" y="80" width="130" height="28" rx="6" fill="#2563EB"/>
  <text x="89" y="94" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">PostToolUse</text>
  <text x="89" y="104" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">도구 실행 후</text>

  <!-- Stop -->
  <rect x="24" y="122" width="130" height="28" rx="6" fill="#3B82F6"/>
  <text x="89" y="136" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Stop</text>
  <text x="89" y="146" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">응답 완료 후</text>

  <!-- SubagentStop -->
  <rect x="24" y="164" width="130" height="28" rx="6" fill="#60A5FA"/>
  <text x="89" y="178" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">SubagentStop</text>
  <text x="89" y="188" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">서브에이전트 완료</text>

  <!-- 화살표들 → 중앙 핸들러 -->
  <line x1="154" y1="52" x2="230" y2="100" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="154" y1="94" x2="230" y2="100" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="154" y1="136" x2="230" y2="100" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="154" y1="178" x2="230" y2="100" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="225,95 240,100 225,105" fill="#93C5FD"/>

  <!-- 중앙 Hub -->
  <circle cx="270" cy="100" r="36" fill="#2563EB"/>
  <text x="270" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="white">Hook</text>
  <text x="270" y="109" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">자동 실행</text>

  <!-- 화살표 Hub → 핸들러들 -->
  <line x1="308" y1="100" x2="362" y2="60" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="308" y1="100" x2="362" y2="100" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="308" y1="100" x2="362" y2="140" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="308" y1="100" x2="362" y2="172" stroke="#2563EB" stroke-width="1.5"/>
  <polygon points="358,55 372,60 360,68" fill="#2563EB"/>
  <polygon points="358,95 372,100 358,105" fill="#2563EB"/>
  <polygon points="358,135 372,140 360,148" fill="#2563EB"/>
  <polygon points="358,167 372,172 360,180" fill="#2563EB"/>

  <!-- 핸들러 박스들 (오른쪽) -->
  <!-- command -->
  <rect x="372" y="40" width="140" height="38" rx="7" fill="#fff" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="380" y="54" font-size="9.5" font-weight="700" fill="#1E3A8A">command</text>
  <text x="380" y="67" font-size="8.5" fill="#3B82F6">쉘 스크립트 실행</text>
  <text x="380" y="72" font-size="7.5" fill="#9CA3AF">eslint --fix, prettier...</text>

  <!-- http -->
  <rect x="372" y="84" width="140" height="30" rx="7" fill="#fff" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="380" y="98" font-size="9.5" font-weight="700" fill="#1E3A8A">http</text>
  <text x="380" y="109" font-size="8.5" fill="#3B82F6">Slack Webhook · 알림</text>

  <!-- prompt -->
  <rect x="372" y="120" width="140" height="30" rx="7" fill="#fff" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="380" y="134" font-size="9.5" font-weight="700" fill="#1E3A8A">prompt</text>
  <text x="380" y="145" font-size="8.5" fill="#3B82F6">Claude에게 판단 위임</text>

  <!-- agent -->
  <rect x="372" y="156" width="140" height="30" rx="7" fill="#fff" stroke="#DBEAFE" stroke-width="1.5"/>
  <text x="380" y="170" font-size="9.5" font-weight="700" fill="#1E3A8A">agent</text>
  <text x="380" y="181" font-size="8.5" fill="#3B82F6">서브에이전트 자동 실행</text>

  <!-- 실전 예시 박스 (우측) -->
  <rect x="528" y="38" width="246" height="154" rx="10" fill="#DBEAFE"/>
  <text x="651" y="56" text-anchor="middle" font-size="10" font-weight="700" fill="#1E3A8A">실전 활용 예시</text>

  <rect x="538" y="62" width="226" height="20" rx="4" fill="#fff"/>
  <text x="548" y="75" font-size="8.5" fill="#1E3A8A">🚫 PreToolUse → rm -rf 차단 + 확인 요청</text>

  <rect x="538" y="88" width="226" height="20" rx="4" fill="#fff"/>
  <text x="548" y="101" font-size="8.5" fill="#1E3A8A">✨ PostToolUse → 파일 저장 시 Prettier 자동 실행</text>

  <rect x="538" y="114" width="226" height="20" rx="4" fill="#fff"/>
  <text x="548" y="127" font-size="8.5" fill="#1E3A8A">📣 Stop → 작업 완료 시 Slack 자동 알림</text>

  <rect x="538" y="140" width="226" height="20" rx="4" fill="#fff"/>
  <text x="548" y="153" font-size="8.5" fill="#1E3A8A">🔍 SubagentStop → 결과 자동 품질 검증</text>

  <rect x="538" y="166" width="226" height="20" rx="4" fill="#fff"/>
  <text x="548" y="179" font-size="8.5" fill="#1E3A8A">🗜️ PreCompact → 중요 메모 자동 보존</text>

</svg>
