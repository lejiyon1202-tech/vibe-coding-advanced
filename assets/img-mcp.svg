<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="200" fill="#EFF6FF" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A" letter-spacing=".5">
    MCP — Claude Code를 외부 서비스와 연결하는 표준 프로토콜
  </text>

  <!-- 중앙 Claude Code 허브 -->
  <circle cx="390" cy="106" r="46" fill="#1E3A8A"/>
  <circle cx="390" cy="106" r="40" fill="#2563EB"/>
  <text x="390" y="100" text-anchor="middle" font-size="11" font-weight="800" fill="white">Claude</text>
  <text x="390" y="115" text-anchor="middle" font-size="9.5" font-weight="600" fill="rgba(255,255,255,0.9)">Code</text>
  <text x="390" y="129" text-anchor="middle" font-size="8.5" fill="rgba(255,255,255,0.7)">MCP 허브</text>

  <!-- 왼쪽 서비스들 -->
  <!-- Slack -->
  <circle cx="100" cy="52" r="28" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="100" y="47" text-anchor="middle" font-size="14">🔔</text>
  <text x="100" y="62" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A">Slack</text>
  <line x1="128" y1="60" x2="346" y2="96" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="344,91 350,100 340,101" fill="#93C5FD"/>

  <!-- GitHub -->
  <circle cx="80" cy="130" r="28" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="80" y="125" text-anchor="middle" font-size="14">🐙</text>
  <text x="80" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A">GitHub</text>
  <line x1="108" y1="130" x2="346" y2="110" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="344,105 350,114 340,114" fill="#93C5FD"/>

  <!-- Gmail -->
  <circle cx="160" cy="176" r="28" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="160" y="171" text-anchor="middle" font-size="14">📧</text>
  <text x="160" y="186" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A">Gmail</text>
  <line x1="184" y1="162" x2="350" y2="128" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="348,123 356,132 346,133" fill="#93C5FD"/>

  <!-- 오른쪽 서비스들 -->
  <!-- Google Drive -->
  <circle cx="680" cy="52" r="28" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="680" y="47" text-anchor="middle" font-size="14">📁</text>
  <text x="680" y="62" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A">G.Drive</text>
  <line x1="652" y1="60" x2="434" y2="96" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="436,91 430,100 440,101" fill="#93C5FD"/>

  <!-- Discord -->
  <circle cx="700" cy="130" r="28" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="700" y="125" text-anchor="middle" font-size="14">💬</text>
  <text x="700" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A">Discord</text>
  <line x1="672" y1="130" x2="434" y2="110" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="436,105 430,114 440,114" fill="#93C5FD"/>

  <!-- Canva -->
  <circle cx="630" cy="176" r="28" fill="#fff" stroke="#DBEAFE" stroke-width="2"/>
  <text x="630" y="171" text-anchor="middle" font-size="14">🎨</text>
  <text x="630" y="186" text-anchor="middle" font-size="9" font-weight="700" fill="#1E3A8A">Canva</text>
  <line x1="606" y1="162" x2="430" y2="128" stroke="#93C5FD" stroke-width="1.5"/>
  <polygon points="432,123 424,132 434,133" fill="#93C5FD"/>

  <!-- scope 레이블 -->
  <rect x="10" y="170" width="58" height="24" rx="5" fill="#DBEAFE"/>
  <text x="39" y="179" text-anchor="middle" font-size="7.5" font-weight="700" fill="#1E3A8A">scope:</text>
  <text x="39" y="189" text-anchor="middle" font-size="7.5" fill="#2563EB">user · project · local</text>

  <!-- install command -->
  <rect x="302" y="162" width="178" height="20" rx="5" fill="#1E3A8A"/>
  <text x="391" y="175" text-anchor="middle" font-size="8.5" fill="#93C5FD" font-family="monospace">claude mcp add slack --scope user</text>

  <!-- 3000+ 배지 -->
  <rect x="730" y="168" width="60" height="24" rx="5" fill="#2563EB"/>
  <text x="760" y="178" text-anchor="middle" font-size="9" font-weight="700" fill="white">3,000+</text>
  <text x="760" y="188" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.8)">서버 생태계</text>

</svg>
