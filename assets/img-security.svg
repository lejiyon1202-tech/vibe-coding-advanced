<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180"
     font-family="'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif">

  <!-- 배경 -->
  <rect width="800" height="180" fill="#FFF5F5" rx="12"/>

  <!-- 제목 -->
  <text x="400" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#7F1D1D" letter-spacing=".5">
    프롬프트 인젝션 — 공격 경로 &amp; 방어 원칙
  </text>

  <!-- 공격 경로 (상단 흐름: 공격자 → 악성 입력 → AI) -->
  <!-- 공격자 -->
  <rect x="40" y="32" width="130" height="52" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="105" y="53" text-anchor="middle" font-size="14">😈</text>
  <text x="105" y="68" text-anchor="middle" font-size="9.5" font-weight="700" fill="#991B1B">공격자</text>
  <text x="105" y="80" text-anchor="middle" font-size="8" fill="#B91C1C">악성 프롬프트 삽입</text>

  <!-- 화살표 (공격자 → AI) -->
  <line x1="172" y1="58" x2="258" y2="58" stroke="#EF4444" stroke-width="2"/>
  <polygon points="254,53 264,58 254,63" fill="#EF4444"/>

  <!-- AI Claude (위험 상태) -->
  <rect x="260" y="32" width="130" height="52" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="325" y="53" text-anchor="middle" font-size="14">🤖</text>
  <text x="325" y="68" text-anchor="middle" font-size="9.5" font-weight="700" fill="#991B1B">Claude AI</text>
  <text x="325" y="80" text-anchor="middle" font-size="8" fill="#B91C1C">악성 지시 수행</text>

  <!-- 화살표 (AI → 피해) -->
  <line x1="392" y1="58" x2="468" y2="58" stroke="#EF4444" stroke-width="2"/>
  <polygon points="464,53 474,58 464,63" fill="#EF4444"/>

  <!-- 피해 -->
  <rect x="470" y="32" width="130" height="52" rx="10" fill="#7F1D1D"/>
  <text x="535" y="53" text-anchor="middle" font-size="14">💀</text>
  <text x="535" y="68" text-anchor="middle" font-size="9.5" font-weight="800" fill="white">피해 발생</text>
  <text x="535" y="80" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.8)">데이터 유출 · 과금 폭탄</text>

  <!-- 구분선 -->
  <line x1="40" y1="108" x2="760" y2="108" stroke="#DBEAFE" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="400" y="104" text-anchor="middle" font-size="8" fill="#64748B">🛡️ Hook PreToolUse 차단 방어선</text>

  <!-- 방어 흐름 (하단: 안전한 경로) -->
  <!-- 입력 -->
  <rect x="40" y="118" width="130" height="46" rx="10" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="105" y="140" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1E3A8A">모든 입력</text>
  <text x="105" y="154" text-anchor="middle" font-size="8" fill="#2563EB">사용자 요청 수신</text>

  <!-- 화살표 -->
  <line x1="172" y1="141" x2="228" y2="141" stroke="#2563EB" stroke-width="2"/>
  <polygon points="224,136 234,141 224,146" fill="#2563EB"/>

  <!-- Hook 필터 -->
  <rect x="230" y="118" width="160" height="46" rx="10" fill="#1E3A8A"/>
  <text x="310" y="138" text-anchor="middle" font-size="9.5" font-weight="800" fill="white">🛡️ PreToolUse Hook</text>
  <text x="310" y="152" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">exit 2 = 위험 명령어 차단</text>

  <!-- 화살표 (허용) -->
  <line x1="392" y1="141" x2="448" y2="141" stroke="#2563EB" stroke-width="2"/>
  <polygon points="444,136 454,141 444,146" fill="#2563EB"/>

  <!-- 안전 실행 -->
  <rect x="450" y="118" width="150" height="46" rx="10" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="2"/>
  <text x="525" y="138" text-anchor="middle" font-size="9.5" font-weight="700" fill="#065F46">✅ 안전 실행</text>
  <text x="525" y="152" text-anchor="middle" font-size="8" fill="#047857">승인된 명령어만 통과</text>

  <!-- 차단 경로 표시 -->
  <rect x="630" y="118" width="130" height="46" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="695" y="138" text-anchor="middle" font-size="9.5" font-weight="700" fill="#92400E">🔴 차단</text>
  <text x="695" y="152" text-anchor="middle" font-size="8" fill="#B45309">위험 패턴 감지 시</text>

  <!-- Hook → 차단 화살표 -->
  <line x1="390" y1="132" x2="628" y2="132" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="624,127 634,132 624,137" fill="#F59E0B"/>

</svg>
