<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440"
     font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif">
  <defs>
    <!-- 블루 화살표 마커 -->
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#2563EB"/>
    </marker>
    <!-- 연한 블루 마커 (분기선용) -->
    <marker id="arr-lb" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#93C5FD"/>
    </marker>
    <!-- 레드 마커 (레드팀) -->
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#DC2626"/>
    </marker>
    <!-- 그림자 필터 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E3A8A" flood-opacity="0.15"/>
    </filter>
    <!-- 레드팀 그림자 -->
    <filter id="shadow-r" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#DC2626" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- ── 배경 ── -->
  <rect width="880" height="440" fill="#F6F8FB" rx="16"/>

  <!-- ── 제목 ── -->
  <text x="440" y="28" text-anchor="middle"
        font-size="12" font-weight="700" fill="#6B7280" letter-spacing="1">
    멀티에이전트 AI 개발 조직 구조
  </text>
  <text x="440" y="44" text-anchor="middle"
        font-size="10" fill="#9CA3AF">
    역할명 기반 · 채널 분리 · 보고 체계 시각화
  </text>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━
       1행 — 총괄 (대표)
  ━━━━━━━━━━━━━━━━━━━━━━ -->
  <rect x="330" y="58" width="220" height="58" rx="12" fill="#111827" filter="url(#shadow)"/>
  <text x="440" y="82" text-anchor="middle" font-size="10" font-weight="600"
        fill="rgba(255,255,255,0.5)" letter-spacing="1.5">LEAD</text>
  <text x="440" y="103" text-anchor="middle" font-size="16" font-weight="800" fill="white">
    총괄 (대표)
  </text>

  <!-- 대표 → 총괄 에이전트 수직선 -->
  <line x1="440" y1="116" x2="440" y2="140"
        stroke="#2563EB" stroke-width="2" marker-end="url(#arr-b)"/>
  <!-- 채널 레이블: 사장실 -->
  <text x="448" y="133" font-size="9" fill="#9CA3AF">사장실</text>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━
       2행 — 총괄 에이전트
  ━━━━━━━━━━━━━━━━━━━━━━ -->
  <rect x="295" y="144" width="290" height="60" rx="12" fill="#2563EB" filter="url(#shadow)"/>
  <text x="440" y="168" text-anchor="middle" font-size="10" font-weight="600"
        fill="rgba(255,255,255,0.6)" letter-spacing="1.5">COORDINATOR</text>
  <text x="440" y="191" text-anchor="middle" font-size="16" font-weight="800" fill="white">
    총괄 에이전트
  </text>

  <!-- 총괄 에이전트 → 수평 분기선 -->
  <line x1="440" y1="204" x2="440" y2="234"
        stroke="#BFDBFE" stroke-width="2"/>
  <line x1="84" y1="234" x2="796" y2="234"
        stroke="#BFDBFE" stroke-width="2"/>

  <!-- 분기선 → 각 팀 수직선 -->
  <!-- 솔루션 개발 팀장 (cx=84) -->
  <line x1="84"  y1="234" x2="84"  y2="254"
        stroke="#BFDBFE" stroke-width="2" marker-end="url(#arr-lb)"/>
  <!-- UI/UX 디자이너 (cx=228) -->
  <line x1="228" y1="234" x2="228" y2="254"
        stroke="#BFDBFE" stroke-width="2" marker-end="url(#arr-lb)"/>
  <!-- 리서치 팀장 (cx=380) -->
  <line x1="380" y1="234" x2="380" y2="254"
        stroke="#BFDBFE" stroke-width="2" marker-end="url(#arr-lb)"/>
  <!-- 제안서 팀장 (cx=536) -->
  <line x1="536" y1="234" x2="536" y2="254"
        stroke="#BFDBFE" stroke-width="2" marker-end="url(#arr-lb)"/>
  <!-- 이밸류에이터 (cx=714) -->
  <line x1="714" y1="234" x2="714" y2="254"
        stroke="#BFDBFE" stroke-width="2" marker-end="url(#arr-lb)"/>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━
       3행 — 5개 팀 박스
  ━━━━━━━━━━━━━━━━━━━━━━ -->

  <!-- 솔루션 개발 팀장 (x=20, w=128, cx=84) -->
  <rect x="20" y="258" width="128" height="64" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="84" y="279" text-anchor="middle" font-size="9" font-weight="600"
        fill="rgba(255,255,255,0.6)" letter-spacing="1">SOLUTION</text>
  <text x="84" y="297" text-anchor="middle" font-size="13" font-weight="700" fill="white">솔루션 개발</text>
  <text x="84" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="white">팀장</text>

  <!-- UI/UX 디자이너 (x=162, w=132, cx=228) -->
  <rect x="162" y="258" width="132" height="64" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="228" y="279" text-anchor="middle" font-size="9" font-weight="600"
        fill="rgba(255,255,255,0.6)" letter-spacing="1">DESIGN</text>
  <text x="228" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="white">UI/UX 디자이너</text>

  <!-- 리서치 팀장 (x=314, w=132, cx=380) -->
  <rect x="314" y="258" width="132" height="64" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="380" y="279" text-anchor="middle" font-size="9" font-weight="600"
        fill="rgba(255,255,255,0.6)" letter-spacing="1">RESEARCH</text>
  <text x="380" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="white">리서치 팀장</text>

  <!-- 제안서 팀장 (x=470, w=132, cx=536) -->
  <rect x="470" y="258" width="132" height="64" rx="10" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="536" y="279" text-anchor="middle" font-size="9" font-weight="600"
        fill="rgba(255,255,255,0.6)" letter-spacing="1">PROPOSAL</text>
  <text x="536" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="white">제안서 팀장</text>

  <!-- 이밸류에이터 (x=650, w=128, cx=714) -->
  <rect x="650" y="258" width="128" height="64" rx="10" fill="#6D28D9" filter="url(#shadow)"/>
  <text x="714" y="279" text-anchor="middle" font-size="9" font-weight="600"
        fill="rgba(255,255,255,0.6)" letter-spacing="1">EVALUATOR</text>
  <text x="714" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="white">이밸류에이터</text>
  <text x="714" y="314" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.75)">(독립 평가)</text>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━
       채널 레이블 (각 팀 아래)
  ━━━━━━━━━━━━━━━━━━━━━━ -->
  <text x="84"  y="337" text-anchor="middle" font-size="9" fill="#6B7280">솔루션-개발 채널</text>
  <text x="228" y="337" text-anchor="middle" font-size="9" fill="#6B7280">솔루션-개발 채널</text>
  <text x="380" y="337" text-anchor="middle" font-size="9" fill="#6B7280">리서치 채널</text>
  <text x="536" y="337" text-anchor="middle" font-size="9" fill="#6B7280">제안서 채널</text>
  <text x="714" y="337" text-anchor="middle" font-size="9" fill="#9061F9">jyp-심사석 채널</text>

  <!-- 서브에이전트 수 표시 -->
  <text x="84"  y="352" text-anchor="middle" font-size="8.5" fill="#93C5FD">하위 9 서브에이전트</text>
  <text x="380" y="352" text-anchor="middle" font-size="8.5" fill="#93C5FD">하위 6 서브에이전트</text>
  <text x="536" y="352" text-anchor="middle" font-size="8.5" fill="#93C5FD">하위 6 서브에이전트</text>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━
       레드팀 (독립, 점선 박스)
  ━━━━━━━━━━━━━━━━━━━━━━ -->
  <!-- 레드팀 → 연결 점선 (총괄에이전트에서 옆으로) -->
  <line x1="796" y1="174" x2="830" y2="174"
        stroke="#FCA5A5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="830" y1="174" x2="830" y2="370"
        stroke="#FCA5A5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="830" y1="370" x2="788" y2="370"
        stroke="#FCA5A5" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-r)"/>

  <!-- 레드팀 박스 -->
  <rect x="630" y="374" width="220" height="54" rx="10" fill="none"
        stroke="#DC2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="740" y="397" text-anchor="middle" font-size="9" font-weight="700"
        fill="#DC2626" letter-spacing="1">RED TEAM · 독립 운영</text>
  <text x="740" y="415" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">
    코드 리뷰 에이전트
  </text>

  <!-- 레드팀 설명 -->
  <text x="740" y="438" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">
    모든 채널 공격 관점 · 보고 체계 밖 · 지적만
  </text>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━
       범례
  ━━━━━━━━━━━━━━━━━━━━━━ -->
  <rect x="20" y="380" width="12" height="12" rx="2" fill="#2563EB"/>
  <text x="38" y="391" font-size="9" fill="#6B7280">정규 보고 체계</text>

  <line x1="120" y1="386" x2="144" y2="386"
        stroke="#FCA5A5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="150" y="391" font-size="9" fill="#6B7280">레드팀 감시 범위</text>

  <rect x="20" y="404" width="12" height="12" rx="2" fill="#6D28D9"/>
  <text x="38" y="415" font-size="9" fill="#6B7280">독립 평가 (이밸류에이터)</text>

  <!-- 직접 보고 금지 표시 -->
  <line x1="200" y1="404" x2="226" y2="404"
        stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="232" y="415" font-size="9" fill="#DC2626">팀장 → 대표 직접 보고 금지</text>
</svg>
